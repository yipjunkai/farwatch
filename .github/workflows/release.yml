name: Release CLI Binaries

# Fires on the vX.Y.Z tag that release-please.yml creates when a release PR is
# merged (release-please tags via a GitHub App, so the tag triggers this).
# Builds the CLI for 4 targets, uploads the tarballs to the GitHub release
# release-please created for the tag, and bumps the Homebrew tap formula.
# publish.yml fires on the same tag to build + push the relay image.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Resolve version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          tag="${REF_NAME}"
          version="${tag#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${version} (tag: ${tag})"

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --package cli --features hosted --target ${{ matrix.target }}

      - name: Package
        id: package
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          name="farwatch-${TAG}-${TARGET}"
          mkdir -p "dist/${name}"
          cp "target/${TARGET}/release/farwatch" "dist/${name}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/${name}/" 2>/dev/null || true
          cd dist
          tar czf "${name}.tar.gz" "${name}"
          echo "asset_path=dist/${name}.tar.gz" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: farwatch-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset_path }}

  release:
    name: Attach Binaries to Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      # release-please already created the GitHub release for this tag; attach
      # the built tarballs to it. No generate_release_notes — release-please
      # owns the changelog and release body.
      - name: Upload binaries to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: artifacts/**/*.tar.gz

  update-formula:
    name: Update Homebrew Tap
    needs: [prepare, release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Mint a token scoped to the tap repo from the same release App that
      # drives release-please. Requires the App installed on homebrew-farwatch
      # with Contents: read+write. Replaces the standalone HOMEBREW_TAP_TOKEN PAT.
      - name: Mint tap-scoped token from the release App
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: tap-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-farwatch

      - name: Checkout tap repo
        uses: actions/checkout@v7
        with:
          repository: yipjunkai/homebrew-farwatch
          token: ${{ steps.tap-token.outputs.token }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Compute SHA256 hashes
        id: hashes
        shell: bash
        run: |
          echo "sha_x86_mac=$(sha256sum artifacts/farwatch-x86_64-apple-darwin/*.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha_arm_mac=$(sha256sum artifacts/farwatch-aarch64-apple-darwin/*.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha_x86_linux=$(sha256sum artifacts/farwatch-x86_64-unknown-linux-gnu/*.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha_arm_linux=$(sha256sum artifacts/farwatch-aarch64-unknown-linux-gnu/*.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update formula
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SHA_X86_MAC: ${{ steps.hashes.outputs.sha_x86_mac }}
          SHA_ARM_MAC: ${{ steps.hashes.outputs.sha_arm_mac }}
          SHA_X86_LINUX: ${{ steps.hashes.outputs.sha_x86_linux }}
          SHA_ARM_LINUX: ${{ steps.hashes.outputs.sha_arm_linux }}
        shell: bash
        run: |
          formula="Formula/farwatch.rb"

          # Update version
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" "$formula"

          # Update tag in download URLs
          sed -i "s|download/v[^/]*/|download/${TAG}/|g" "$formula"
          sed -i "s|farwatch-v[^-]*-|farwatch-${TAG}-|g" "$formula"

          # Update SHA256 hashes (each sha256 line follows the url line for that target)
          sed -i "/x86_64-apple-darwin/{n;s/sha256 \"[^\"]*\"/sha256 \"${SHA_X86_MAC}\"/;}" "$formula"
          sed -i "/aarch64-apple-darwin/{n;s/sha256 \"[^\"]*\"/sha256 \"${SHA_ARM_MAC}\"/;}" "$formula"
          sed -i "/x86_64-unknown-linux-gnu/{n;s/sha256 \"[^\"]*\"/sha256 \"${SHA_X86_LINUX}\"/;}" "$formula"
          sed -i "/aarch64-unknown-linux-gnu/{n;s/sha256 \"[^\"]*\"/sha256 \"${SHA_ARM_LINUX}\"/;}" "$formula"

      - name: Commit and push updated formula
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/farwatch.rb
          git diff --cached --quiet || git commit -m "farwatch ${TAG}"
          git push
