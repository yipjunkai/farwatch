name: audit

# Dependency-tree audit (cargo-audit). This answers "did the *world* change?" —
# a newly published advisory reddens it with no change to this repo — so it runs
# on a daily clock plus the PRs and pushes that change the dependency tree,
# instead of on every PR. The PR-attributable security checks (dependency-review,
# CodeQL) live in security.yml.
#
# A scheduled failure files (or updates) a single tracking issue via the alert
# job below; without that, a red cron dies unseen in the Actions tab.

on:
  schedule:
    - cron: "0 5 * * *" # daily 05:00 UTC (security Mon 06:00, fuzz 03:00)
  workflow_dispatch:
  pull_request:
    # GitHub Actions YAML has no anchors — keep this list and the push list
    # below identical. Every file that pins a dependency version.
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/*/Cargo.toml"
      - "fuzz/Cargo.toml"
      - "fuzz/Cargo.lock"
      - ".github/workflows/audit.yml"
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/*/Cargo.toml"
      - "fuzz/Cargo.toml"
      - "fuzz/Cargo.lock"
      - ".github/workflows/audit.yml"

concurrency:
  group: audit-${{ github.ref }}
  # PRs cancel superseded runs; main-ref runs (pushes and the daily cron share
  # this group) queue instead.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-audit
        # Prebuilt, checksum-verified binary — `cargo install` would compile it
        # from source on every run. Deliberately manual tool pin (no Dependabot
        # ecosystem covers install-action tool strings); the daily cron
        # exercises it, so a stale/broken pin is loud.
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-audit@0.22.2
      - name: Audit the workspace lockfile
        run: cargo audit --deny warnings
      - name: Audit the fuzz workspace lockfile
        # fuzz/ is a standalone workspace with its own committed lock; the
        # default invocation above only reads ./Cargo.lock.
        run: cargo audit --deny warnings --file fuzz/Cargo.lock

  alert:
    name: file tracking issue
    needs: [cargo-audit]
    # Runs on every SCHEDULED outcome: a failure files (or refreshes) the
    # tracking issue; a success closes it. The issue therefore exists exactly
    # while the audit is red — self-creating, self-cleaning, at most one open at
    # a time. PR and dispatch runs never touch issues (a human is watching
    # those). Cancelled/skipped results are no-ops.
    if: ${{ always() && github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Sync the audit-failure issue to the run result
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CARGO_RESULT: ${{ needs.cargo-audit.result }}
        run: |
          existing=$(gh issue list --label audit-failure --state open \
            --json number --jq '.[0].number // empty')
          if [ "$CARGO_RESULT" = "failure" ]; then
            gh label create audit-failure --color D93F0B \
              --description "Scheduled dependency audit is failing" --force
            if [ -n "$existing" ]; then
              gh issue comment "$existing" --body "Scheduled audit still failing: $RUN_URL"
            else
              gh issue create --title "Scheduled dependency audit failing" \
                --label audit-failure \
                --body "The daily \`cargo audit\` run failed — most likely a new advisory against a pinned dependency. Run: $RUN_URL"
            fi
          elif [ "$CARGO_RESULT" = "success" ]; then
            if [ -n "$existing" ]; then
              gh issue close "$existing" \
                --comment "Resolved — the scheduled audit is green again: $RUN_URL"
            fi
          fi
