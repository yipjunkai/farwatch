name: Verify

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on PRs, but never on main — every main commit keeps
  # its own verdict (a cancelled run leaves a commit unbisectable).
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # Detect whether any non-docs file changed; the heavy jobs gate on this so a
  # docs-only PR skips compile/test while ci-passed still reports.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # workflow_dispatch is a human explicitly requesting a run — never gate it.
      code: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          # 'every': a file counts as code only if it matches ALL patterns, so
          # the negated docs globs actually exclude docs-only changes.
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!LICENSE*'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          extra_args: --results=verified,unknown

  lint:
    name: Lint and Format
    needs: changes
    if: ${{ needs.changes.outputs.code != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Lockfile sync check
        # Errors if Cargo.lock would need updating — a PR that edits Cargo.toml
        # without committing the lock fails here instead of CI silently
        # re-resolving deps. Also warms the cargo cache.
        run: cargo fetch --locked
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: changes
    if: ${{ needs.changes.outputs.code != 'false' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      # Run both OSes to completion so one platform's failure doesn't hide another.
      fail-fast: false
      matrix:
        # The OSes we ship release binaries for.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Test
        run: cargo test --workspace --all-features

  ci-passed:
    # Single check that branch protection can require, instead of listing each
    # job by name. Succeeds only if all needed jobs succeeded or were skipped.
    name: ci-passed
    if: ${{ always() }}
    needs: [changes, secret-scanning, lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate required-job results
        env:
          NEEDS_RESULT: ${{ toJSON(needs) }}
        run: |
          set -e
          echo "$NEEDS_RESULT" | jq -r 'to_entries[] | "\(.key)\t\(.value.result)"'
          if echo "$NEEDS_RESULT" | jq -e 'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled")' > /dev/null; then
            echo "::error::At least one required job failed or was cancelled."
            exit 1
          fi
          echo "All required jobs passed."
